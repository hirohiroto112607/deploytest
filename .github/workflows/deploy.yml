name: Deploy to Home Cluster

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (all / aquos / pixel7a / tone)"
        required: false
        default: "aquos"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target || 'aquos' }}"

          AQUOS='{"name":"aquos","host":"100.89.12.118","port":"8022","label":"AQUOS Sense3"}'
          PIXEL='{"name":"pixel7a","host":"100.87.78.4","port":"8022","label":"Pixel 7a"}'
          TONE='{"name":"tone","host":"100.125.51.5","port":"2022","label":"TONE e19"}'

          case "$TARGET" in
            aquos)   MATRIX="[$AQUOS]" ;;
            pixel7a) MATRIX="[$PIXEL]" ;;
            tone)    MATRIX="[$TONE]" ;;
            *)       MATRIX="[$AQUOS,$PIXEL,$TONE]" ;;
          esac

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: "--accept-routes"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} -H ${{ matrix.host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer source to ${{ matrix.label }}
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ matrix.port }} -o StrictHostKeyChecking=no" \
            ./ \
            user@${{ matrix.host }}:~/apps/GreetingBadge/

      - name: Build and restart on ${{ matrix.label }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ matrix.port }} -o StrictHostKeyChecking=no \
            user@${{ matrix.host }} \
            "cd ~/apps/GreetingBadge \
              && rm -rf node_modules \
              && npm ci \
              && PORT=3001 npm run build \
              && if pm2 describe GreetingBadge > /dev/null 2>&1; then \
                   PORT=3001 pm2 restart GreetingBadge --update-env; \
                 else \
                   PORT=3001 pm2 start npm --name GreetingBadge -- start; \
                 fi \
              && pm2 save"

      - name: Write summary
        if: always()
        run: echo "## ${{ matrix.label }} ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
