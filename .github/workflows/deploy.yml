name: Deploy to Home Cluster

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (all / aquos / pixel7a / tone)"
        required: false
        default: "aquos"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target || 'all' }}"

          AQUOS='{"name":"aquos","host":"100.89.12.118","port":"8022","label":"AQUOS Sense3"}'
          PIXEL='{"name":"pixel7a","host":"100.87.78.4","port":"8022","label":"Pixel 7a"}'
          TONE='{"name":"tone","host":"100.125.51.5","port":"2022","label":"TONE e19"}'

          case "$TARGET" in
            aquos)   MATRIX="[$AQUOS]" ;;
            pixel7a) MATRIX="[$PIXEL]" ;;
            tone)    MATRIX="[$TONE]" ;;
            *)       MATRIX="[$AQUOS,$PIXEL,$TONE]" ;;
          esac

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-name.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - id: set-name
        run: echo "name=nextjs-build-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.name }}
          path: |
            .next/
            public/
            package.json
            package-lock.json
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: "--accept-routes"

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} -H ${{ matrix.host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.label }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ matrix.port }} -o StrictHostKeyChecking=no" \
            ./dist/ \
            user@${{ matrix.host }}:~/apps/GreetingBadge/

          ssh -i ~/.ssh/deploy_key -p ${{ matrix.port }} -o StrictHostKeyChecking=no \
            user@${{ matrix.host }} \
            "cd ~/apps/GreetingBadge \
              && ls -la .next 2>/dev/null || echo '[ERROR] .next missing' \
              && npm ci --production --ignore-scripts \
              && if pm2 describe GreetingBadge > /dev/null 2>&1; then \
                   PORT=3001 pm2 restart GreetingBadge --update-env; \
                 else \
                   PORT=3001 pm2 start npm --name GreetingBadge -- start; \
                 fi \
              && pm2 save"

      - name: Write summary
        if: always()
        run: echo "## ${{ matrix.label }} ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
