name: PR Trust Guard

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, edited]

jobs:
  trust-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Block third-party PRs
        env:
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || false }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          TRUSTED_AUTHOR=false
          IS_FORK_NORMALIZED="${IS_FORK:-false}"
          HEAD_REPO_NORMALIZED="${HEAD_REPO:-unknown}"
          case "${AUTHOR_ASSOCIATION}" in
            OWNER|MEMBER|COLLABORATOR) TRUSTED_AUTHOR=true ;;
          esac

          if [ "${TRUSTED_AUTHOR}" != "true" ]; then
            echo "::error::Third-party PRs are not allowed to merge into main."
            echo "::error::author_association=${AUTHOR_ASSOCIATION}, is_fork=${IS_FORK_NORMALIZED}, head_repo=${HEAD_REPO_NORMALIZED}, base_repo=${BASE_REPO}"
            exit 1
          fi

          echo "Trusted PR source. Merge to main is allowed."
